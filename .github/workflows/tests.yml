name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test-cli:
    name: Test CLI Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install CLI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "extensions/cli/[dev]"
      - name: Run CLI tests
        run: |
          cd extensions/cli
          python -m pytest tests/ -v
  test-tui:
    name: Test TUI Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install CLI dependencies (TUI depends on CLI)
        run: |
          python -m pip install --upgrade pip
          pip install -e extensions/cli/
      - name: Install TUI dependencies
        run: |
          pip install -e "extensions/tui/[dev]"
      - name: Run TUI tests
        run: |
          cd extensions/tui
          python -m pytest tests/ -v
  test-python-scripts:
    name: Test Python Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML jsonschema
      - name: Run scripts tests
        run: |
          python -m pytest scripts/tests/ -v
