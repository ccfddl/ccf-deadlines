name: MergeCheck
on:
  pull_request:
    branches: [main]
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install CLI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "extensions/cli/[dev]"
      - name: Install TUI dependencies
        run: |
          pip install -e "extensions/tui/[dev]"
      - name: Run CLI tests
        run: |
          cd extensions/cli
          python -m pytest tests/ -v
      - name: Run TUI tests
        run: |
          cd extensions/tui
          python -m pytest tests/ -v
      - name: Install scripts dependencies
        run: |
          python -m pip install PyYAML jsonschema
      - name: Run scripts tests
        run: |
          python -m pytest scripts/tests/ -v
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v2.3.4
      - name: Setup Node.js environment
        uses: actions/setup-node@main
        with:
          node-version: '15.x'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12.12
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML jsonschema
      - name: Assemble yml files
        run: |
          mkdir -p public/conference && cd public/conference
          python ../../scripts/merge.py ../../conference --exclude "types.yml" > allconf.yml
          python ../../scripts/merge.py ../../accept_rates > allacc.yml
          cp ../../conference/types.yml .
          cd ../..
      # Install Rust Nightly Toolchain, with Clippy & Rustfmt
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown
      - name: Download and install Trunk binary
        run: wget -qO- https://github.com/trunk-rs/trunk/releases/download/v0.18.4/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf-
      - name: Build with Trunk
        # "${GITHUB_REPOSITORY#*/}" evaluates into the name of the repository
        # using --public-url something will allow trunk to modify all the href paths like from favicon.ico to repo_name/favicon.ico .
        # this is necessary for github pages where the site is deployed to username.github.io/repo_name and all files must be requested
        # relatively as favicon.ico. if we skip public-url option, the href paths will instead request username.github.io/favicon.ico which
        # will obviously return error 404 not found.
        run: ./trunk build --release
